# Standalone OpenTelemetry Collector (contrib) — OTLP ingestion → shared ClickHouse.
# Replaces the HyperDX-supervised collector, which could not run without the
# HyperDX app (OpAMP config source). Forward-looking capacity for future apps'
# logs/traces/metrics; SNMP goes via Telegraf, flows via Akvorado — neither uses this.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
  batch: {}
exporters:
  clickhouse:
    endpoint: tcp://ch-server:9000?dial_timeout=10s
    database: default
    username: default
    password: ""
    create_schema: true
    ttl: 720h
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
