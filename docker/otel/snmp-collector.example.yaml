# Template — the real docker/otel/snmp-collector.yaml is generated by
# gen-snmp-targets.sh from default.exporters and is gitignored.
receivers:
  snmp/example:
    collection_interval: 60s
    endpoint: udp://192.0.2.1:161      # placeholder device
    version: v2c
    community: ${env:SNMP_COMMUNITY}
    resource_attributes:
      snmp.interface.index:
        oid: "1.3.6.1.2.1.2.2.1.1"     # ifIndex
    metrics:
      snmp.interface.in.octets:
        unit: By
        sum:
          aggregation: cumulative
          monotonic: true
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.31.1.1.1.6"      # ifHCInOctets
            resource_attributes: [snmp.interface.index]
      snmp.interface.out.octets:
        unit: By
        sum:
          aggregation: cumulative
          monotonic: true
          value_type: int
        column_oids:
          - oid: "1.3.6.1.2.1.31.1.1.1.10"     # ifHCOutOctets
            resource_attributes: [snmp.interface.index]

processors:
  batch: {}

# HyperDX's OSS collector does not accept external OTLP (its otlp receiver is not
# wired into any pipeline), so write straight to the shared ClickHouse using the
# same clickhouse exporter HyperDX itself uses -> default.otel_metrics_* tables.
exporters:
  clickhouse:
    endpoint: tcp://ch-server:9000?dial_timeout=10s
    database: default
    username: default
    password: ""
    create_schema: true
    ttl: 720h

service:
  pipelines:
    metrics:
      receivers: [snmp/example]
      processors: [batch]
      exporters: [clickhouse]
