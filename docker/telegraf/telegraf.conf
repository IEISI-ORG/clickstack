# Container state across the whole host, not just this stack's own containers --
# feeds the "container down" Grafana alert. Talks to docker-socket-proxy (a
# read-only, whitelisted proxy), never the real docker.sock directly. Includes
# non-running states so a stopped container still reports container_status=exited
# each interval instead of silently disappearing from the metric.
[[inputs.docker]]
  endpoint = "tcp://docker-socket-proxy:2375"
  gather_services = false
  container_state_include = ["created", "restarting", "running", "paused", "exited", "dead"]
  timeout = "10s"
  # Only keep container state. The plugin's other measurements (docker,
  # docker_container_mem/cpu/net/blkio) have field sets that vary between
  # flushes, and outputs.sql only derives a table's schema from the first
  # write -- a later flush with a new field then fails the insert.
  namepass = ["docker_container_status"]
  # Container labels become tags (= extra SQL columns) by default. Labels vary
  # wildly per image (OCI standard labels, custom ones), which hits the same
  # outputs.sql fixed-schema problem as above. We don't need them for state.
  docker_label_exclude = ["*"]

# Write everything straight to the shared ClickHouse. ClickHouse needs an explicit
# ENGINE — the plugin's default template omits it — hence the custom table_template.
[[outputs.sql]]
  driver = "clickhouse"
  data_source_name = "clickhouse://default:@ch-server:9000/default"
  ## Name the timestamp column "time" and order by it. Do NOT use the
  ## {TAG_COLUMN_NAMES}/{TIMESTAMP_COLUMN_NAME} template vars — Telegraf 1.32
  ## leaves them unexpanded and ClickHouse then mis-parses the "{...}" as a
  ## query parameter.
  timestamp_column = "time"
  table_template = "CREATE TABLE {TABLE}({COLUMNS}) ENGINE = MergeTree() ORDER BY time"
  [outputs.sql.convert]
    conversion_style = "literal"
    integer   = "Int64"
    unsigned  = "UInt64"
    real      = "Float64"
    text      = "String"
    bool      = "UInt8"
    timestamp = "DateTime"
    defaultvalue = "String"
