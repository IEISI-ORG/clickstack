# Telegraf base config (committed). The SNMP input (agents + IF-MIB fields) is
# generated into telegraf.d/agents.conf by gen-telegraf-agents.sh (gitignored;
# holds real device IPs). Telegraf reads this file + --config-directory.

[agent]
  interval = "60s"
  round_interval = true
  flush_interval = "60s"
  omit_hostname = true

# ---- gNMI streaming telemetry (TEMPLATE — enable when you have gNMI-capable
#      gear: Cisco IOS-XR/NX-OS, Juniper, Arista, Nokia. MikroTik has no gNMI.) ----
# [[inputs.gnmi]]
